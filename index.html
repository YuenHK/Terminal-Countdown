<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL COUNTDOWN - 終極核爆版</title>
    <style>
        :root {
            --bg-color: #000;
            --panel-bg: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s;
        }

        /* 強化 Canvas 背景 */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        /* 炸彈 UI 核心 */
        .bomb-display {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            box-shadow: 0 0 80px rgba(0,0,0,1);
            border: 12px solid #222;
        }

        /* 關卡皮膚 */
        .lvl-1 { background: radial-gradient(circle at 30% 30%, #ff1f1f, #4a0000); border-color: #300; box-shadow: 0 0 50px #ff000066; }
        .lvl-2 { background: radial-gradient(circle at 30% 30%, #00ff6a, #003311); border-color: #002200; box-shadow: 0 0 50px #00ff0066; }
        .lvl-3 { background: radial-gradient(circle at 30% 30%, #ffea00, #400080); border-color: #220044; box-shadow: 0 0 70px #ffea0077; }

        .timer-text {
            font-size: 5.5rem;
            font-family: 'Courier New', monospace;
            font-weight: 900;
            margin: 0;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            letter-spacing: -2px;
        }

        .label-text {
            font-size: 1.1rem;
            letter-spacing: 5px;
            opacity: 0.8;
            margin-top: -5px;
            font-weight: bold;
        }

        /* 單行按鈕面板 */
        .button-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: var(--panel-bg);
            padding: 20px 35px;
            border-radius: 60px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        button {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s ease;
            white-space: nowrap;
        }

        button:hover {
            background: #444;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #btn-toggle { background: #d35400; border-color: #e67e22; min-width: 130px; }
        #btn-next { background: #6c3483; border-color: #8e44ad; }

        /* 動畫效果 */
        .pulse { animation: pulseAnim 0.8s infinite; }
        @keyframes pulseAnim { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
        
        .shake { animation: shakeAnim 0.06s infinite; }
        @keyframes shakeAnim { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, -3px); } }

        /* 3秒爆炸特效 */
        .explode-active { animation: explodeFlash 3s cubic-bezier(0.1, 0, 0.1, 1) forwards; }
        @keyframes explodeFlash {
            0% { filter: brightness(20); background: #fff; transform: scale(1); }
            5% { background: #ff0000; transform: scale(1.8) rotate(2deg); }
            15% { transform: scale(1.7) rotate(-2deg); }
            100% { background: #000; filter: brightness(1); transform: scale(1); }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="main-container">
    <div id="bomb-ui" class="bomb-display lvl-1">
        <h1 id="timer" class="timer-text">05:00</h1>
        <div id="status" class="label-text">CLASSIC TNT</div>
    </div>

    <div class="button-bar">
        <button onclick="changeTime()">設定時間</button>
        <button onclick="speedUp()">加速 -30s</button>
        <button id="btn-toggle" onclick="toggleTimer()">開始／暫停</button>
        <button onclick="resetAll()">重置</button>
        <button id="btn-next" onclick="goNext()">下一關</button>
    </div>
</div>

<script>
    let timeLeft = 300, level = 1, isRunning = false, interval;
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let particles = [];

    // 初始化畫布
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    // 粒子系統設計
    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 4 + 1;
            this.speedX = (Math.random() - 0.5) * 3;
            this.speedY = (Math.random() - 0.5) * 3;
            this.life = Math.random() * 100;
        }
        draw() {
            const colors = ['', '#ff3333', '#33ff88', '#ffff33'];
            ctx.fillStyle = colors[level];
            ctx.globalAlpha = this.life / 100;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.6;
            if (this.life <= 0) this.reset();
        }
    }
    for(let i=0; i<120; i++) particles.push(new Particle());

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (isRunning) {
            particles.forEach(p => { p.update(); p.draw(); });
            ctx.lineWidth = 3;
            if (level === 1) { // 擴散圈
                ctx.strokeStyle = '#f00'; ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, (Date.now()%1000)/1.5, 0, Math.PI*2); ctx.stroke();
            } else if (level === 2) { // 掃描綠線
                ctx.strokeStyle = '#0f0'; ctx.beginPath();
                let y = (Date.now()/4)%canvas.height;
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            } else if (level === 3) { // 隨機電漿
                ctx.strokeStyle = '#ff0'; ctx.beginPath();
                ctx.moveTo(canvas.width/2, canvas.height/2);
                ctx.lineTo(Math.random()*canvas.width, Math.random()*canvas.height); ctx.stroke();
            }
        }
        requestAnimationFrame(animate);
    }
    animate();

    // 音效系統
    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = level === 3 ? 'sawtooth' : 'square';
        osc.frequency.setValueAtTime([0, 600, 900, 1800][level], audioCtx.currentTime);
        g.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05);
        g.gain.setTargetAtTime(0, audioCtx.currentTime + 0.1, 0.01);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function playExplosionSound() {
        const duration = 3;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1200, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + duration);

        const g = audioCtx.createGain();
        g.gain.setValueAtTime(1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

        noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
        noise.start(); noise.stop(audioCtx.currentTime + duration);

        // 衝擊波震撼感
        const shock = audioCtx.createOscillator();
        shock.frequency.setValueAtTime(80, audioCtx.currentTime);
        shock.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1.5);
        const sg = audioCtx.createGain();
        sg.gain.setValueAtTime(0.6, audioCtx.currentTime);
        sg.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
        shock.connect(sg); sg.connect(audioCtx.destination);
        shock.start(); shock.stop(audioCtx.currentTime + 1.5);
    }

    // 邏輯控制
    function updateUI() {
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function toggleTimer() {
        const btn = document.getElementById('btn-toggle');
        const ui = document.getElementById('bomb-ui');
        if (isRunning) {
            clearInterval(interval);
            ui.classList.remove('pulse', 'shake');
            btn.innerText = "繼續倒數";
        } else {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            interval = setInterval(() => {
                if (timeLeft <= 0) { doExplode(); return; }
                timeLeft--; updateUI(); playTick();
            }, 1000);
            ui.classList.add(level === 3 ? 'shake' : 'pulse');
            btn.innerText = "暫停倒數";
        }
        isRunning = !isRunning;
    }

    function doExplode() {
        clearInterval(interval);
        document.body.classList.add('explode-active');
        playExplosionSound();
        setTimeout(() => {
            //alert("⚠️ 核心已毀滅 ⚠️");
            resetAll();
            document.body.classList.remove('explode-active');
        }, 3000);
    }

    function goNext() {
        level = (level % 3) + 1;
        const ui = document.getElementById('bomb-ui');
        ui.className = `bomb-display lvl-${level}`;
        if (isRunning) ui.classList.add(level === 3 ? 'shake' : 'pulse');
        const names = ["", "CLASSIC TNT", "BIO-HAZARD", "NUCLEAR CORE"];
        document.getElementById('status').innerText = names[level];
    }

    function changeTime() {
        let m = prompt("設定倒數分鐘:", "5");
        if(m) { timeLeft = parseInt(m) * 60; updateUI(); if(isRunning) toggleTimer(); }
    }

    function speedUp() {
        timeLeft = Math.max(0, timeLeft - 30);
        updateUI();
        if(timeLeft === 0 && isRunning) doExplode();
    }

    function resetAll() {
        clearInterval(interval);
        isRunning = false;
        timeLeft = 300;
        updateUI();
        document.getElementById('btn-toggle').innerText = "開始倒數";
        document.getElementById('bomb-ui').classList.remove('pulse', 'shake');
    }

    updateUI();
</script>
</body>
</html>
